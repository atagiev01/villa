<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Elsad Villa – Admin İdarəetmə Paneli</title>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-gradient: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
      --card-bg: #ffffff;
      --primary-gold: #b39243;
      --booked: #d9534f;
      --booked-bg-alpha: rgba(217, 83, 79, 0.15);
      --open-text: #2d3748;
      --text-muted: #718096;
      --heading-color: #1a202c;
      --radius-lg: 16px;
      --radius-md: 10px;
      --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.3);
    }

    body {
      background: var(--bg-gradient);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      color: #fff;
      padding: 40px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container { width: 100%; max-width: 540px; display: none; }

    header {
      text-align: center;
      margin-bottom: 24px;
    }
    .admin-badge {
      display: inline-block;
      background: #fed7d7;
      color: #9b2c2c;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 12px;
    }
    header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: #fff;
    }
    header p {
      font-size: 0.9rem;
      color: #a0aec0;
      margin-top: 6px;
    }

    .month-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-md);
      color: var(--open-text);
    }
    .month-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--heading-color);
      margin-bottom: 20px;
      text-align: center;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    .cal-header {
      text-align: center;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
      padding-bottom: 12px;
      text-transform: uppercase;
    }
    .cal-header.weekend { color: var(--primary-gold); }

    .day-cell {
      aspect-ratio: 1;
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s;
    }
    
    .day-cell.empty { background: transparent; cursor: default; pointer-events: none; }
    .day-cell.open { background: #f7fafc; border: 1px solid #edf2f7; }
    .day-cell.open:hover {
      background: #e2e8f0;
      border-color: var(--primary-gold);
    }
    
    .day-cell.booked {
      background: var(--booked-bg-alpha);
      border: 1px solid var(--booked);
    }
    .day-cell.booked .day-num { color: var(--booked); }
    .day-cell.booked .day-label { color: var(--booked); font-weight: 700; }

    .day-num {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--open-text);
    }
    .day-label {
      font-size: 0.55rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-top: 3px;
      color: var(--text-muted);
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
      font-size: 0.8rem;
      color: #a0aec0;
    }
    .legend span { display: flex; align-items: center; gap: 8px; }
    .legend-dot {
      width: 14px; height: 14px; border-radius: 4px;
    }
    .legend-dot.booked { background: var(--booked-bg-alpha); border: 1px solid var(--booked); }
    .legend-dot.open { background: #f7fafc; border: 1px solid #edf2f7; }

    .loading-overlay {
      position: fixed; inset: 0;
      background: #1a202c;
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      transition: opacity 0.3s;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #4a5568;
      border-top-color: var(--primary-gold);
      border-radius: 50%;
      animation: spin 0.8s infinite linear;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="loading-overlay" id="loader"><div class="spinner"></div></div>

<div class="container" id="admin-container">
  <header>
    <span class="admin-badge">Admin Panel</span>
    <h1>Elsad Villa İdarəetmə</h1>
    <p>Təqvimdə günlərin üzərinə klikləyərək statusunu dəyişin (Açıq / Rezervli).</p>
  </header>

  <div id="calendars"></div>

  <div class="legend">
    <span><span class="legend-dot open"></span>Boş (Açıq)</span>
    <span><span class="legend-dot booked"></span>Rezervli (Qırmızı)</span>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, doc, deleteDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // Şifrə yoxlanılması
  const pass = prompt("Admin Giriş Şifrəsini daxil edin:");
  if (pass !== "elsadvilla2026") {
    alert("Yanlış şifrə! Səhifəyə girişiniz əngəlləndi.");
    window.location.href = "index.html"; 
  } else {
    document.getElementById("admin-container").style.display = "block";
  }

  // Sənin düzgün Firebase məlumatların
  const firebaseConfig = {
    apiKey: "AIzaSyA5DCkFzLyQx8LFa8I1VtEUnDXq2s_7G9c",
    authDomain: "villa-f121b.firebaseapp.com",
    databaseURL: "https://villa-f121b-default-rtdb.firebaseio.com",
    projectId: "villa-f121b",
    storageBucket: "villa-f121b.firebasestorage.app",
    messagingSenderId: "847515117194",
    appId: "1:847515117194:web:ce24375ee2af476a3c2f73",
    measurementId: "G-VE5NZVWY3J"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let bookedDates = new Set();

  const MONTH_NAMES = [
    "", "Yanvar", "Fevral", "Mart", "Aprel", "May", "İyun",
    "İyul", "Avqust", "Sentyabr", "Oktyabr", "Noyabr", "Dekabr"
  ];

  const now = new Date();
  const currentYear = now.getFullYear();
  const currentMonth = now.getMonth() + 1;
  const currentDay = now.getDate();

  let nextMonth = currentMonth + 1;
  let nextYear = currentYear;
  if (nextMonth > 12) {
    nextMonth = 1;
    nextYear++;
  }

  const MONTHS = [
    { year: currentYear, month: currentMonth, startDay: currentDay },
    { year: nextYear, month: nextMonth, startDay: 1 }
  ];

  function dateKey(y, m, d) {
    return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function daysInMonth(year, month) {
    return new Date(year, month, 0).getDate();
  }

  function weekdayOf(year, month, day) {
    const d = new Date(year, month - 1, day).getDay();
    return d === 0 ? 6 : d - 1;
  }

  function buildCalendars() {
    const wrap = document.getElementById("calendars");
    wrap.innerHTML = "";

    MONTHS.forEach(({ year, month, startDay }) => {
      const total = daysInMonth(year, month);
      const card = document.createElement("div");
      card.className = "month-card";

      const titleText = `${MONTH_NAMES[month]} ${year}`;
      card.innerHTML = `<div class="month-title">${titleText}</div>`;

      const grid = document.createElement("div");
      grid.className = "cal-grid";

      ["B.e", "Ç.a", "Çər", "C.a", "Cüm", "Şnb", "Baz"].forEach((n, i) => {
        const h = document.createElement("div");
        h.className = "cal-header" + (i >= 5 ? " weekend" : "");
        h.textContent = n;
        grid.appendChild(h);
      });

      const firstCol = weekdayOf(year, month, startDay);
      for (let e = 0; e < firstCol; e++) {
        const emp = document.createElement("div");
        emp.className = "day-cell empty";
        grid.appendChild(emp);
      }

      for (let d = startDay; d <= total; d++) {
        const key = dateKey(year, month, d);
        const cell = document.createElement("div");
        const isBooked = bookedDates.has(key);
        
        cell.className = "day-cell " + (isBooked ? "booked" : "open");
        cell.dataset.key = key;

        cell.innerHTML = `
          <span class="day-num">${d}</span>
          <span class="day-label">${isBooked ? "REZERVLİ" : "AÇIQ"}</span>`;
        
        cell.addEventListener("click", () => toggleDateAdmin(key, isBooked));
        grid.appendChild(cell);
      }

      card.appendChild(grid);
      wrap.appendChild(card);
    });
  }

  async function toggleDateAdmin(key, isCurrentlyBooked) {
    try {
      const docRef = doc(db, "bookings", key);
      if (isCurrentlyBooked) {
        await deleteDoc(docRef);
        bookedDates.delete(key);
      } else {
        await setDoc(docRef, { booked: true, date: key });
        bookedDates.add(key);
      }
      buildCalendars();
    } catch (e) {
      alert("Yazma xətası! Firebase icazələrini (Rules) yoxlayın: " + e.message);
    }
  }

  try {
    const bookingsCol = collection(db, "bookings");
    onSnapshot(bookingsCol, (snap) => {
      bookedDates.clear();
      snap.forEach(doc => {
        bookedDates.add(doc.id);
      });
      buildCalendars();
      document.getElementById("loader").classList.add("hidden");
    }, (err) => {
      console.error("Firebase xətası:", err.message);
      document.getElementById("loader").classList.add("hidden");
      buildCalendars();
    });
  } catch (error) {
    console.error("Sistem xətası:", error);
    document.getElementById("loader").classList.add("hidden");
    buildCalendars();
  }
</script>
</body>
</html>
