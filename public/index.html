<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Elsad Villa – Rezervasiya Təqvimi</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght=600;700;800&family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
      --card-bg: #ffffff;
      --primary-gold: #b39243;
      --primary-gold-hover: #967631;
      --booked: #d9534f;
      --booked-bg-alpha: rgba(217, 83, 79, 0.1);
      --open-text: #2d3748;
      --text-muted: #718096;
      --heading-color: #1a202c;
      --selected-range: #f0e6cc;
      --radius-lg: 16px;
      --radius-md: 10px;
      --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
      --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
    }

    body {
      background: var(--bg-gradient);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      color: var(--open-text);
      padding: 40px 16px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container { width: 100%; max-width: 540px; }

    header {
      text-align: center;
      margin-bottom: 32px;
    }
    .badge {
      display: inline-block;
      background: rgba(179, 146, 67, 0.12);
      color: var(--primary-gold);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 12px;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 8vw, 3.2rem);
      color: var(--heading-color);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .features-list {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .feature-tag {
      background: var(--card-bg);
      padding: 6px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      border-radius: 30px;
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .selection-info-box {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-md);
      border-left: 5px solid var(--primary-gold);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
    }
    .selection-info-box h4 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    .selection-dates {
      font-size: 1rem;
      font-weight: 700;
      color: var(--heading-color);
      margin-top: 4px;
    }
    .clear-selection {
      background: #f3f4f6;
      border: none;
      color: var(--text-muted);
      padding: 6px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .clear-selection:hover { background: #e5e7eb; color: #1a202c; }

    .month-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-md);
    }
    .month-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--heading-color);
      margin-bottom: 20px;
      text-align: center;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    .cal-header {
      text-align: center;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
      padding-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .cal-header.weekend { color: var(--primary-gold); }

    .day-cell {
      aspect-ratio: 1;
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    
    .day-cell.empty { background: transparent; cursor: default; pointer-events: none; }
    .day-cell.open { background: #f7fafc; border: 1px solid #edf2f7; }
    .day-cell.open:hover {
      background: #fff;
      border-color: var(--primary-gold);
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }
    
    .day-cell.booked {
      background: var(--booked-bg-alpha);
      border: 1px solid rgba(217, 83, 79, 0.2);
      cursor: not-allowed;
    }
    .day-cell.booked .day-num { color: var(--booked); }
    .day-cell.booked .day-label { color: var(--booked); font-weight: 600; }

    .day-cell.selected-start, .day-cell.selected-end {
      background: var(--primary-gold) !important;
      color: #fff !important;
      border-color: var(--primary-gold) !important;
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(179,146,67,0.3);
    }
    .day-cell.selected-start .day-num, .day-cell.selected-end .day-num,
    .day-cell.selected-start .day-label, .day-cell.selected-end .day-label {
      color: #fff !important;
    }

    .day-cell.selected-in-between {
      background: var(--selected-range) !important;
      border-color: #e5d5ac !important;
      border-radius: 4px;
    }

    .day-num {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--open-text);
    }
    .day-label {
      font-size: 0.55rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 3px;
      color: var(--text-muted);
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 8px 0 24px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
    }
    .legend span { display: flex; align-items: center; gap: 8px; }
    .legend-dot {
      width: 14px; height: 14px; border-radius: 4px;
    }
    .legend-dot.booked { background: var(--booked-bg-alpha); border: 1px solid var(--booked); }
    .legend-dot.open { background: #f7fafc; border: 1px solid #edf2f7; }
    .legend-dot.selected { background: var(--primary-gold); }

    .cta-block { text-align: center; margin-top: 10px; }
    .whatsapp-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #25d366;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      padding: 16px 36px;
      border-radius: 50px;
      box-shadow: 0 10px 20px rgba(37,211,102,0.25);
      transition: all 0.2s ease;
      width: 100%;
    }
    .whatsapp-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(37,211,102,0.35);
      background: #20ba59;
    }
    .whatsapp-btn svg { width: 22px; height: 22px; fill: #fff; }
    .sub-note { margin-top: 12px; font-size: 0.8rem; color: var(--text-muted); }

    .loading-overlay {
      position: fixed; inset: 0;
      background: #f5f7fa;
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      transition: opacity 0.3s;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #e2e8f0;
      border-top-color: var(--primary-gold);
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 450px) {
      .cal-grid { gap: 5px; }
      .day-label { font-size: 0.5rem; }
      .day-num { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loader"><div class="spinner"></div></div>

<div class="container">
  <header>
    <span class="badge">EKSKLÜZİV VİLLA</span>
    <h1>Elsad Villa</h1>
    <div class="features-list">
      <span class="feature-tag">📍 Qəbələ</span>
      <span class="feature-tag">🔥 Qızdırılan Hovuz</span>
      <span class="feature-tag">👶 Uşaq Hovuzu</span>
      <span class="feature-tag">🔌 Avto Şarj</span>
    </div>
  </header>

  <div class="selection-info-box" id="info-box">
    <div>
      <h4 id="selection-status-title">TARİX SEÇİN</h4>
      <div class="selection-dates" id="selected-dates-text">Giriş və çıxış tarixini klikləyin</div>
    </div>
    <button class="clear-selection" id="clear-btn" style="display: none;">Təmizlə</button>
  </div>

  <div id="calendars"></div>

  <div class="legend">
    <span><span class="legend-dot open"></span>Mövcuddur</span>
    <span><span class="legend-dot booked"></span>Rezervli</span>
    <span><span class="legend-dot selected"></span>Seçiminiz</span>
  </div>

  <div class="cta-block">
    <a class="whatsapp-btn" id="whatsapp-link" href="#" target="_blank">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
      </svg>
      <span>WhatsApp ilə Rezerv Et</span>
    </a>
    <p class="sub-note">&middot;  Sürətli əlaqə </p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // SƏNİN DÜZGÜN FİRREBASE MƏLUMATLARIN
  const firebaseConfig = {
    apiKey: "AIzaSyA5DCkFzLyQx8LFa8I1VtEUnDXq2s_7G9c",
    authDomain: "villa-f121b.firebaseapp.com",
    databaseURL: "https://villa-f121b-default-rtdb.firebaseio.com",
    projectId: "villa-f121b",
    storageBucket: "villa-f121b.firebasestorage.app",
    messagingSenderId: "847515117194",
    appId: "1:847515117194:web:ce24375ee2af476a3c2f73",
    measurementId: "G-VE5NZVWY3J"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const WHATSAPP_NUMBER = "994556519390"; 

  let bookedDates = new Set();
  let selectedStart = null;
  let selectedEnd = null;

  const MONTH_NAMES = [
    "", "Yanvar", "Fevral", "Mart", "Aprel", "May", "İyun",
    "İyul", "Avqust", "Sentyabr", "Oktyabr", "Noyabr", "Dekabr"
  ];

  const now = new Date();
  const currentYear = now.getFullYear();
  const currentMonth = now.getMonth() + 1;
  const currentDay = now.getDate();

  let nextMonth = currentMonth + 1;
  let nextYear = currentYear;
  if (nextMonth > 12) {
    nextMonth = 1;
    nextYear++;
  }

  const MONTHS = [
    { year: currentYear, month: currentMonth, startDay: currentDay },
    { year: nextYear, month: nextMonth, startDay: 1 }
  ];

  function dateKey(y, m, d) {
    return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function parseDateKey(key) {
    const [y, m, d] = key.split("-").map(Number);
    return new Date(y, m - 1, d);
  }

  function daysInMonth(year, month) {
    return new Date(year, month, 0).getDate();
  }

  function weekdayOf(year, month, day) {
    const d = new Date(year, month - 1, day).getDay();
    return d === 0 ? 6 : d - 1;
  }

  function buildCalendars() {
    const wrap = document.getElementById("calendars");
    wrap.innerHTML = "";

    MONTHS.forEach(({ year, month, startDay }) => {
      const total = daysInMonth(year, month);
      const card = document.createElement("div");
      card.className = "month-card";

      const titleText = `${MONTH_NAMES[month]} ${year}`;
      card.innerHTML = `<div class="month-title">${titleText}</div>`;

      const grid = document.createElement("div");
      grid.className = "cal-grid";

      ["B.e", "Ç.a", "Çər", "C.a", "Cüm", "Şnb", "Baz"].forEach((n, i) => {
        const h = document.createElement("div");
        h.className = "cal-header" + (i >= 5 ? " weekend" : "");
        h.textContent = n;
        grid.appendChild(h);
      });

      const firstCol = weekdayOf(year, month, startDay);
      for (let e = 0; e < firstCol; e++) {
        const emp = document.createElement("div");
        emp.className = "day-cell empty";
        grid.appendChild(emp);
      }

      for (let d = startDay; d <= total; d++) {
        const key = dateKey(year, month, d);
        const cell = document.createElement("div");
        const isBooked = bookedDates.has(key);
        
        cell.className = "day-cell " + (isBooked ? "booked" : "open");
        cell.dataset.key = key;

        if (!isBooked) {
          if (selectedStart === key) cell.classList.add("selected-start");
          else if (selectedEnd === key) cell.classList.add("selected-end");
          else if (selectedStart && selectedEnd && key > selectedStart && key < selectedEnd) {
            cell.classList.add("selected-in-between");
          }
        }

        cell.innerHTML = `
          <span class="day-num">${d}</span>
          <span class="day-label">${isBooked ? "REZERVLİ" : "AÇIQ"}</span>`;
        
        cell.addEventListener("click", () => handleDayClick(key, isBooked));
        grid.appendChild(cell);
      }

      card.appendChild(grid);
      wrap.appendChild(card);
    });

    updateUI();
  }

  function handleDayClick(key, isBooked) {
    if (isBooked) return;

    if (!selectedStart || (selectedStart && selectedEnd)) {
      selectedStart = key;
      selectedEnd = null;
    } else if (selectedStart && !selectedEnd) {
      if (key < selectedStart) {
        selectedStart = key;
      } else {
        if (rangeContainsBooked(selectedStart, key)) {
          alert("Seçdiyiniz aralıqda rezerv olunmuş günlər var. Zəhmət olmasa başqa tarixlər seçin.");
          clearSelection();
          return;
        }
        selectedEnd = key;
      }
    }
    buildCalendars();
  }

  function rangeContainsBooked(start, end) {
    let current = parseDateKey(start);
    const last = parseDateKey(end);
    while (current <= last) {
      const k = dateKey(current.getFullYear(), current.getMonth() + 1, current.getDate());
      if (bookedDates.has(k)) return true;
      current.setDate(current.getDate() + 1);
    }
    return false;
  }

  function clearSelection() {
    selectedStart = null;
    selectedEnd = null;
    buildCalendars();
  }

  document.getElementById("clear-btn").addEventListener("click", clearSelection);

  function updateUI() {
    const statusTitle = document.getElementById("selection-status-title");
    const datesText = document.getElementById("selected-dates-text");
    const clearBtn = document.getElementById("clear-btn");
    const waLink = document.getElementById("whatsapp-link");

    if (selectedStart && selectedEnd) {
      const startObj = parseDateKey(selectedStart);
      const endObj = parseDateKey(selectedEnd);
      const diffTime = Math.abs(endObj - startObj);
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

      const formatStart = `${startObj.getDate()} ${MONTH_NAMES[startObj.getMonth() + 1]}`;
      const formatEnd = `${endObj.getDate()} ${MONTH_NAMES[endObj.getMonth() + 1]}`;

      statusTitle.textContent = "SEÇİLMİŞ TARİX ARALIĞI";
      datesText.innerHTML = `${formatStart} — ${formatEnd} <span style="color:var(--primary-gold)">(${diffDays} Gecə)</span>`;
      clearBtn.style.display = "block";

      const msg = `Salam! ${startObj.getDate()}.${startObj.getMonth() + 1}.${startObj.getFullYear()} - ${endObj.getDate()}.${endObj.getMonth() + 1}.${endObj.getFullYear()} tarixləri üçün (${diffDays} gecə) Elsad Villa-da rezervasiya etmək istəyirəm.`;
      waLink.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
    } else if (selectedStart) {
      const startObj = parseDateKey(selectedStart);
      statusTitle.textContent = "GİRİŞ TARİXİ SEÇİLDİ";
      datesText.textContent = `${startObj.getDate()} ${MONTH_NAMES[startObj.getMonth() + 1]} (İndi çıxış tarixini seçin)`;
      clearBtn.style.display = "block";
      waLink.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent("Salam! Elsad Villa haqqında məlumat almaq istəyirəm.")}`;
    } else {
      statusTitle.textContent = "TARİX SEÇİN";
      datesText.textContent = "Giriş və çıxış tarixini klikləyin";
      clearBtn.style.display = "none";
      waLink.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent("Salam! Elsad Villa haqqında məlumat almaq istəyirəm.")}`;
    }
  }

  try {
    const bookingsCol = collection(db, "bookings");
    onSnapshot(bookingsCol, (snap) => {
      bookedDates.clear();
      snap.forEach(doc => {
        bookedDates.add(doc.id);
      });
      buildCalendars();
      document.getElementById("loader").classList.add("hidden");
    }, (err) => {
      console.error("Firebase xətası:", err.message);
      document.getElementById("loader").classList.add("hidden");
      buildCalendars();
    });
  } catch (error) {
    console.error("Sistem xətası:", error);
    document.getElementById("loader").classList.add("hidden");
    buildCalendars();
  }
</script>
</body>
</html>
