<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Elsad Villa – Rezervasiya Təqvimi</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght=600;700;800&family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet"/>
  
  <!-- Konfetti və Emoji Animasiyası üçün Kitabxana -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
      --card-bg: #ffffff;
      --primary-gold: #b39243;
      --booked: #d9534f;
      --booked-bg-alpha: rgba(217, 83, 79, 0.1);
      --open-text: #2d3748;
      --text-muted: #718096;
      --heading-color: #1a202c;
      --selected-range: #f0e6cc;
      --radius-lg: 16px;
      --radius-md: 10px;
      --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.05);
      --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.08);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body {
      background: var(--bg-gradient);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      color: var(--open-text);
      padding: 20px 8px 60px; /* Balaca ekranlar üçün kənar boşluq azaldıldı */
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    .container { 
      width: 100%; 
      max-width: 500px;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    header { text-align: center; margin-bottom: 24px; }
    .badge {
      display: inline-block; background: rgba(179, 146, 67, 0.12); color: var(--primary-gold);
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 5px 12px; border-radius: 50px; margin-bottom: 10px; transition: transform 0.3s;
    }
    header h1 {
      font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 7vw, 2.8rem);
      color: var(--heading-color); font-weight: 800; line-height: 1.1;
    }
    .features-list { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .feature-tag {
      background: var(--card-bg); padding: 4px 8px; font-size: 0.72rem; font-weight: 600;
      color: var(--text-muted); border-radius: 30px; box-shadow: var(--shadow-sm);
    }

    .selection-info-box {
      background: var(--card-bg); border-radius: var(--radius-lg); padding: 12px;
      margin-bottom: 16px; box-shadow: var(--shadow-md); border-left: 4px solid var(--primary-gold);
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .selection-info-box.active {
      transform: scale(1.02); box-shadow: var(--shadow-lg); border-left-color: #25d366;
    }
    .selection-info-box h4 { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .selection-dates { font-size: 0.88rem; font-weight: 700; color: var(--heading-color); margin-top: 2px; }
    .clear-selection {
      background: #f3f4f6; border: none; color: var(--text-muted); padding: 6px 10px;
      font-size: 0.7rem; font-weight: 600; border-radius: 6px; cursor: pointer; transition: all 0.2s;
      flex-shrink: 0;
    }
    .clear-selection:hover { background: #e5e7eb; color: #1a202c; }

    .month-card { background: var(--card-bg); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow-md); }
    .month-title { font-size: 1rem; font-weight: 700; color: var(--heading-color); margin-bottom: 14px; text-align: center; }

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; } /* Balaca ekranlar üçün gap azaldıldı */
    .cal-header { text-align: center; font-size: 0.65rem; font-weight: 700; color: var(--text-muted); padding-bottom: 8px; }
    .cal-header.weekend { color: var(--primary-gold); }

    .day-cell {
      aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; cursor: pointer; user-select: none; transition: all 0.25s;
    }
    .day-cell.empty { background: transparent; cursor: default; pointer-events: none; }
    .day-cell.open { background: #f7fafc; border: 1px solid #edf2f7; }
    .day-cell.open:hover { background: #fff; border-color: var(--primary-gold); transform: translateY(-2px); z-index: 2; }
    .day-cell.booked { background: var(--booked-bg-alpha); border: 1px solid rgba(217, 83, 79, 0.12); cursor: not-allowed; }
    .day-cell.booked .day-num { color: var(--booked); }
    .day-cell.booked .day-label { color: var(--booked); font-weight: 600; }

    @keyframes pulseSelect {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1.03); }
    }
    .day-cell.selected-start, .day-cell.selected-end {
      background: var(--primary-gold) !important; color: #fff !important; border-color: var(--primary-gold) !important;
      animation: pulseSelect 0.4s both; z-index: 3; box-shadow: 0 4px 10px rgba(179,146,67,0.3);
    }
    .day-cell.selected-start .day-num, .day-cell.selected-end .day-num,
    .day-cell.selected-start .day-label, .day-cell.selected-end .day-label { color: #fff !important; }

    .day-cell.selected-in-between {
      background: var(--selected-range) !important; border-color: #e5d5ac !important; border-radius: 2px;
    }

    .day-num { font-size: 0.9rem; font-weight: 700; color: var(--open-text); }
    .day-label { font-size: 0.48rem; font-weight: 600; margin-top: 1px; color: var(--text-muted); text-transform: uppercase; }

    .legend { display: flex; justify-content: center; gap: 12px; margin: 8px 0 16px; font-size: 0.72rem; font-weight: 600; color: var(--text-muted); }
    .legend span { display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
    .legend-dot.booked { background: var(--booked-bg-alpha); border: 1px solid var(--booked); }
    .legend-dot.open { background: #f7fafc; border: 1px solid #edf2f7; }
    .legend-dot.selected { background: var(--primary-gold); }

    @keyframes pulseBtn {
      0% { box-shadow: 0 6px 15px rgba(37,211,102,0.2); }
      50% { box-shadow: 0 6px 20px rgba(37,211,102,0.4); }
      100% { box-shadow: 0 6px 15px rgba(37,211,102,0.2); }
    }
    .cta-block { text-align: center; margin-top: 10px; }
    .whatsapp-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: #25d366; color: #fff;
      text-decoration: none; font-weight: 700; font-size: 0.95rem; padding: 14px 24px; border-radius: 50px; width: 100%; animation: pulseBtn 2s infinite; transition: all 0.3s;
    }
    .whatsapp-btn:hover { transform: translateY(-2px); background: #20ba59; }
    .whatsapp-btn svg { width: 18px; height: 18px; fill: #fff; }
    .sub-note { margin-top: 8px; font-size: 0.72rem; color: var(--text-muted); }

    .loading-overlay {
      position: fixed; inset: 0; background: #f5f7fa; display: flex; align-items: center; justify-content: center; z-index: 999; transition: opacity 0.5s, visibility 0.5s;
    }
    .loading-overlay.hidden { opacity: 0; visibility: hidden; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #e2e8f0; border-top-color: var(--primary-gold); border-radius: 50%; animation: spin 0.8s infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 📱 300px və Daha Kiçik Ekranlar Üçün Tam Uyğunlaşma (Responsive) */
    @media (max-width: 350px) {
      body { padding: 10px 4px 40px; }
      .container { max-width: 100%; }
      header h1 { font-size: 1.6rem; }
      .badge { font-size: 0.65rem; padding: 4px 10px; }
      .feature-tag { font-size: 0.65rem; padding: 3px 6px; }
      .month-card { padding: 10px; border-radius: 12px; }
      .month-title { font-size: 0.88rem; margin-bottom: 10px; }
      .cal-grid { gap: 3px; }
      .cal-header { font-size: 0.55rem; padding-bottom: 4px; }
      .day-num { font-size: 0.78rem; }
      .day-label { font-size: 0.4rem; margin-top: 0px; letter-spacing: -0.02em; }
      .day-cell { border-radius: 4px; }
      .selection-info-box { padding: 8px; border-radius: 12px; }
      .selection-dates { font-size: 0.78rem; }
      .clear-selection { font-size: 0.65rem; padding: 4px 8px; }
      .legend { font-size: 0.65rem; gap: 8px; }
      .whatsapp-btn { font-size: 0.85rem; padding: 12px 18px; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loader"><div class="spinner"></div></div>

<div class="container">
  <header>
    <span class="badge">EKSKLÜZİV VİLLA</span>
    <h1>Elsad Villa</h1>
    <div class="features-list">
      <span class="feature-tag">📍 Qəbələ</span>
      <span class="feature-tag">🔥 Hovuz</span>
      <span class="feature-tag">🔌 Şarj</span>
    </div>
  </header>

  <div class="selection-info-box" id="info-box">
    <div>
      <h4 id="selection-status-title">TARİX SEÇİN</h4>
      <div class="selection-dates" id="selected-dates-text">Giriş və çıxış tarixini klikləyin</div>
    </div>
    <button class="clear-selection" id="clear-btn" style="display: none;">Təmizlə</button>
  </div>

  <div id="calendars"></div>

  <div class="legend">
    <span><span class="legend-dot open"></span>Açıq</span>
    <span><span class="legend-dot booked"></span>Rezervli</span>
    <span><span class="legend-dot selected"></span>Seçim</span>
  </div>

  <div class="cta-block">
    <a class="whatsapp-btn" id="whatsapp-link" href="#" target="_blank">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
      </svg>
      <span>WhatsApp ilə Rezerv Et</span>
    </a>
    <p class="sub-note">Sürətli əlaqə &middot; Ön ödəmə yoxdur</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA5DCkFzLyQx8LFa8I1VtEUnDXq2s_7G9c",
    authDomain: "villa-f121b.firebaseapp.com",
    databaseURL: "https://villa-f121b-default-rtdb.firebaseio.com",
    projectId: "villa-f121b",
    storageBucket: "villa-f121b.firebasestorage.app",
    messagingSenderId: "847515117194",
    appId: "1:847515117194:web:ce24375ee2af476a3c2f73"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const WHATSAPP_NUMBER = "994503110212"; 

  let bookedDates = new Set();
  let selectedStart = null;
  let selectedEnd = null;

  const MONTH_NAMES = ["", "Yanvar", "Fevral", "Mart", "Aprel", "May", "İyun", "İyul", "Avqust", "Sentyabr", "Oktyabr", "Noyabr", "Dekabr"];
  const now = new Date();
  const currentYear = now.getFullYear();
  const currentMonth = now.getMonth() + 1;
  const currentDay = now.getDate();

  let nextMonth = currentMonth + 1;
  let nextYear = currentYear;
  if (nextMonth > 12) { nextMonth = 1; nextYear++; }

  const MONTHS = [
    { year: currentYear, month: currentMonth, startDay: currentDay },
    { year: nextYear, month: nextMonth, startDay: 1 }
  ];

  function dateKey(y, m, d) { return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
  function parseDateKey(key) { const [y, m, d] = key.split("-").map(Number); return new Date(y, m - 1, d); }
  function daysInMonth(year, month) { return new Date(year, month, 0).getDate(); }
  function weekdayOf(year, month, day) { const d = new Date(year, month - 1, day).getDay(); return d === 0 ? 6 : d - 1; }

  function fireCelebration() {
    confetti({ particleCount: 50, angle: 60, spread: 50, origin: { x: 0 }, colors: ['#b39243', '#25d366'] });
    confetti({ particleCount: 50, angle: 120, spread: 50, origin: { x: 1 }, colors: ['#b39243', '#25d366'] });
    
    setTimeout(() => {
      confetti({
        particleCount: 25, spread: 80, origin: { y: 0.65 },
        shapes: ['text'], shapeOptions: { text: { value: ['🎉', '✨', '🏡', '💚'] } }, scalar: 2
      });
    }, 180);
  }

  function buildCalendars() {
    const wrap = document.getElementById("calendars");
    wrap.innerHTML = "";

    MONTHS.forEach(({ year, month, startDay }) => {
      const total = daysInMonth(year, month);
      const card = document.createElement("div");
      card.className = "month-card";
      card.innerHTML = `<div class="month-title">${MONTH_NAMES[month]} ${year}</div>`;
      const grid = document.createElement("div"); grid.className = "cal-grid";

      ["B.e", "Ç.a", "Çər", "C.a", "Cüm", "Şnb", "Baz"].forEach((n, i) => {
        const h = document.createElement("div"); h.className = "cal-header" + (i >= 5 ? " weekend" : ""); h.textContent = n; grid.appendChild(h);
      });

      const firstCol = weekdayOf(year, month, startDay);
      for (let e = 0; e < firstCol; e++) {
        const emp = document.createElement("div"); emp.className = "day-cell empty"; grid.appendChild(emp);
      }

      for (let d = startDay; d <= total; d++) {
        const key = dateKey(year, month, d);
        const cell = document.createElement("div");
        const isBooked = bookedDates.has(key);
        
        cell.className = "day-cell " + (isBooked ? "booked" : "open");
        
        if (!isBooked) {
          if (selectedStart === key) cell.classList.add("selected-start");
          else if (selectedEnd === key) cell.classList.add("selected-end");
          else if (selectedStart && selectedEnd && key > selectedStart && key < selectedEnd) {
            cell.classList.add("selected-in-between");
          }
        }

        cell.innerHTML = `<span class="day-num">${d}</span><span class="day-label">${isBooked ? "REZERVLİ" : "AÇIQ"}</span>`;
        cell.addEventListener("click", () => handleDayClick(key, isBooked));
        grid.appendChild(cell);
      }
      card.appendChild(grid); wrap.appendChild(card);
    });

    updateUI();
  }

  function handleDayClick(key, isBooked) {
    if (isBooked) return;

    if (!selectedStart || (selectedStart && selectedEnd)) {
      selectedStart = key;
      selectedEnd = null;
    } else if (selectedStart && !selectedEnd) {
      if (key < selectedStart) {
        selectedStart = key;
      } else {
        if (rangeContainsBooked(selectedStart, key)) {
          alert("Seçdiyiniz aralıqda rezerv olunmuş günlər var. Zəhmət olmasa başqa tarixlər seçin.");
          clearSelection();
          return;
        }
        selectedEnd = key;
        fireCelebration(); 
      }
    }
    buildCalendars();
  }

  function rangeContainsBooked(start, end) {
    let current = parseDateKey(start); const last = parseDateKey(end);
    while (current <= last) {
      if (bookedDates.has(dateKey(current.getFullYear(), current.getMonth() + 1, current.getDate()))) return true;
      current.setDate(current.getDate() + 1);
    }
    return false;
  }

  function clearSelection() { selectedStart = null; selectedEnd = null; buildCalendars(); }
  document.getElementById("clear-btn").addEventListener("click", clearSelection);

  function updateUI() {
    const statusTitle = document.getElementById("selection-status-title");
    const datesText = document.getElementById("selected-dates-text");
    const clearBtn = document.getElementById("clear-btn");
    const waLink = document.getElementById("whatsapp-link");
    const infoBox = document.getElementById("info-box");

    if (selectedStart && selectedEnd) {
      const startObj = parseDateKey(selectedStart), endObj = parseDateKey(selectedEnd);
      const diffDays = Math.ceil(Math.abs(endObj - startObj) / (1000 * 60 * 60 * 24));
      
      statusTitle.textContent = "SEÇİLMİŞ TARİX ARALIĞI";
      datesText.innerHTML = `${startObj.getDate()} ${MONTH_NAMES[startObj.getMonth() + 1]} — ${endObj.getDate()} ${MONTH_NAMES[endObj.getMonth() + 1]} <span style="color:var(--primary-gold)">(${diffDays} Gecə)</span>`;
      clearBtn.style.display = "block"; infoBox.classList.add("active");

      const msg = `Salam! ${startObj.getDate()}.${startObj.getMonth() + 1}.${startObj.getFullYear()} - ${endObj.getDate()}.${endObj.getMonth() + 1}.${endObj.getFullYear()} tarixləri üçün (${diffDays} gecə) Elsad Villa-da rezervasiya etmək istəyirəm.`;
      waLink.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
    } else if (selectedStart) {
      statusTitle.textContent = "GİRİŞ TARİXİ SEÇİLDİ";
      datesText.textContent = `${parseDateKey(selectedStart).getDate()} ${MONTH_NAMES[parseDateKey(selectedStart).getMonth() + 1]} (İndi çıxış tarixini seçin)`;
      clearBtn.style.display = "block"; infoBox.classList.remove("active");
      waLink.href = `https://wa.me/${WHATSAPP_NUMBER}?text=Salam! Elsad Villa haqqında məlumat almaq istəyirəm.`;
    } else {
      statusTitle.textContent = "TARİX SEÇİN"; datesText.textContent = "Giriş və çıxış tarixini klikləyin";
      clearBtn.style.display = "none"; infoBox.classList.remove("active");
      waLink.href = `https://wa.me/${WHATSAPP_NUMBER}?text=Salam! Elsad Villa haqqında məlumat almaq istəyirəm.`;
    }
  }

  try {
    onSnapshot(collection(db, "bookings"), (snap) => {
      bookedDates.clear(); snap.forEach(doc => bookedDates.add(doc.id));
      buildCalendars(); document.getElementById("loader").classList.add("hidden");
    });
  } catch (error) { document.getElementById("loader").classList.add("hidden"); buildCalendars(); }
</script>
</body>
</html>
