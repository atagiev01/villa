<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Elsad Villa – Real Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght=700;800&family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --primary-gold: #c5a85c;
      --primary-gold-hover: #b39243;
      --booked: #ef4444;
      --booked-bg: rgba(239, 68, 68, 0.15);
      --open-text: #f1f5f9;
      --text-muted: #94a3b8;
      --radius-lg: 20px;
      --radius-md: 12px;
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
    }
    body {
      background: var(--bg-gradient);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      color: var(--open-text);
      padding: 24px 8px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .dashboard { width: 100%; max-width: 460px; display: none; }
    
    header { text-align: center; margin-bottom: 20px; position: relative; }
    .admin-badge { display: inline-block; background: rgba(197, 168, 92, 0.15); color: var(--primary-gold); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; padding: 6px 14px; border-radius: 50px; margin-bottom: 8px; border: 1px solid rgba(197, 168, 92, 0.2); }
    header h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 800; background: linear-gradient(to right, #fff, var(--primary-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .logout-btn {
      position: absolute; right: 0; top: 10px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);
      color: #ef4444; padding: 6px 14px; font-size: 0.75rem; font-weight: 700; border-radius: 50px; cursor: pointer; transition: all 0.2s;
    }
    .logout-btn:hover { background: #ef4444; color: #fff; }

    .month-card { 
      background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-lg);
    }
    .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .month-title { font-size: 1.15rem; font-weight: 700; color: #fff; letter-spacing: 0.03em; }
    .nav-btn {
      background: rgba(255,255,255,0.05); border: 1px solid var(--card-border);
      width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.2rem; transition: all 0.2s;
    }
    .nav-btn:hover:not(:disabled) { background: var(--primary-gold); color: #0f172a; }
    .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .cal-header { text-align: center; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); padding-bottom: 8px; }
    .cal-header.weekend { color: var(--primary-gold); }

    .day-cell { aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; user-select: none; position: relative; transition: all 0.2s; }
    .day-cell.empty { background: transparent; cursor: default; pointer-events: none; }
    .day-cell.past { opacity: 0.2; cursor: not-allowed; pointer-events: none; background: rgba(255,255,255,0.02); }
    .day-cell.open { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.05); }
    .day-cell.open:hover { background: rgba(197, 168, 92, 0.15); border-color: var(--primary-gold); transform: scale(1.05); }
    .day-cell.booked { background: var(--booked-bg); border: 1px solid rgba(239, 66, 66, 0.3); }
    .day-cell.booked:hover { background: rgba(239, 66, 66, 0.25); border-color: var(--booked); transform: scale(1.05); }
    .day-num { font-size: 0.95rem; font-weight: 700; color: #fff; }
    .day-cell.booked .day-num { color: #ff8080; }
    .status-dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 4px; }
    .day-cell.open .status-dot { background: var(--primary-gold); }
    .day-cell.booked .status-dot { background: var(--booked); }

    .info-bar { background: rgba(197, 168, 92, 0.08); border: 1px solid rgba(197, 168, 92, 0.15); border-radius: var(--radius-md); padding: 12px; font-size: 0.8rem; text-align: center; margin-top: 16px; color: var(--text-muted); }
    
    .loading-overlay { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 999; transition: opacity 0.3s; }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--primary-gold); border-radius: 50%; animation: spin 0.8s infinite linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 🔒 Giriş Paneli */
    .auth-overlay { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 998; }
    .auth-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius-lg); padding: 32px; width: 100%; max-width: 360px; text-align: center; box-shadow: var(--shadow-lg); }
    .auth-card h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 8px; color: #fff; }
    .auth-card p { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 24px; }
    .auth-input { width: 100%; padding: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--card-border); border-radius: var(--radius-md); color: #fff; font-size: 1rem; margin-bottom: 12px; outline: none; transition: border-color 0.2s; }
    .auth-input:focus { border-color: var(--primary-gold); }
    .auth-btn { width: 100%; padding: 14px; background: var(--primary-gold); border: none; border-radius: var(--radius-md); color: #0f172a; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
    .auth-btn:hover { background: var(--primary-gold-hover); }
    .error-msg { color: var(--booked); font-size: 0.8rem; margin-top: 10px; display: none; }
  </style>
</head>
<body>

<div class="loading-overlay" id="loader"><div class="spinner"></div></div>

<!-- 🔒 Giriş Ekranı -->
<div class="auth-overlay" id="auth-screen">
  <div class="auth-card">
    <h2>Giriş Paneli</h2>
    <p>Elsad Villa idarəetməsi üçün daxil olun</p>
    <input type="email" id="email-input" class="auth-input" placeholder="Email ünvanı" />
    <input type="password" id="password-input" class="auth-input" placeholder="Şifrə" />
    <button id="login-btn" class="auth-btn">Daxil Ol</button>
    <div id="error-message" class="error-msg">Giriş uğursuz oldu! Məlumatları yoxlayın.</div>
  </div>
</div>

<!-- 👑 İdarəetmə Paneli (Dashboard) -->
<div class="dashboard" id="admin-dashboard">
  <header>
    <span class="admin-badge">Canlı İdarəetmə</span>
    <h1>Villa Dashboard</h1>
    <button class="logout-btn" id="logout-btn">Çıxış</button>
  </header>

  <div class="month-card">
    <div class="cal-nav">
      <button class="nav-btn" id="prev-btn">‹</button>
      <div class="month-title" id="month-label">...</div>
      <button class="nav-btn" id="next-btn">›</button>
    </div>
    <div class="cal-grid" id="calendar-grid"></div>
  </div>

  <div class="info-bar">
    💡 İstənilən gələcək günə toxunaraq statusunu dərhal dəyişə bilərsiniz.
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA5DCkFzLyQx8LFa8I1VtEUnDXq2s_7G9c",
    authDomain: "villa-f121b.firebaseapp.com",
    databaseURL: "https://villa-f121b-default-rtdb.firebaseio.com",
    projectId: "villa-f121b",
    storageBucket: "villa-f121b.firebasestorage.app",
    messagingSenderId: "847515117194",
    appId: "1:847515117194:web:ce24375ee2af476a3c2f73"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let bookedDates = new Set();
  let unsubscribeSnapshot = null;
  const MONTH_NAMES = ["", "Yanvar", "Fevral", "Mart", "Aprel", "May", "İyun", "İyul", "Avqust", "Sentyabr", "Oktyabr", "Noyabr", "Dekabr"];
  
  const todayObj = new Date();
  let viewYear = todayObj.getFullYear();
  let viewMonth = todayObj.getMonth() + 1;

  const authScreen = document.getElementById("auth-screen");
  const adminDashboard = document.getElementById("admin-dashboard");
  const emailInput = document.getElementById("email-input");
  const passwordInput = document.getElementById("password-input");
  const loginBtn = document.getElementById("login-btn");
  const logoutBtn = document.getElementById("logout-btn");
  const errorMsg = document.getElementById("error-message");
  const loader = document.getElementById("loader");

  // 📡 Giriş Statusunu İdarə Edən Hissə
  onAuthStateChanged(auth, (user) => {
    if (user) {
      authScreen.style.display = "none";
      adminDashboard.style.display = "block";
      startFirebaseListener();
    } else {
      authScreen.style.display = "flex";
      adminDashboard.style.display = "none";
      if(unsubscribeSnapshot) unsubscribeSnapshot();
      loader.classList.add("hidden");
    }
  });

  // 🔐 Giriş Etmək
  loginBtn.addEventListener("click", async () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    if(!email || !password) return;

    loader.classList.remove("hidden");
    try {
      await signInWithEmailAndPassword(auth, email, password);
      errorMsg.style.display = "none";
    } catch (error) {
      errorMsg.style.display = "block";
    } finally {
      loader.classList.add("hidden");
    }
  });

  // 🚪 Çıxış Etmək
  logoutBtn.addEventListener("click", async () => {
    loader.classList.remove("hidden");
    await signOut(auth);
  });

  function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
  function weekdayOf(y, m, d) { const day = new Date(y, m - 1, d).getDay(); return day === 0 ? 6 : day - 1; }

  function renderAdminCalendar() {
    const grid = document.getElementById("calendar-grid");
    document.getElementById("month-label").textContent = `${MONTH_NAMES[viewMonth]} ${viewYear}`;
    grid.innerHTML = "";

    document.getElementById("prev-btn").disabled = (viewYear === todayObj.getFullYear() && viewMonth === todayObj.getMonth() + 1);

    ["B.e", "Ç.a", "Çər", "C.a", "Cüm", "Şnb", "Baz"].forEach((n, i) => {
      const h = document.createElement("div"); h.className = "cal-header" + (i >= 5 ? " weekend" : ""); h.textContent = n; grid.appendChild(h);
    });

    const totalDays = daysInMonth(viewYear, viewMonth);
    const firstCol = weekdayOf(viewYear, viewMonth, 1);

    for (let e = 0; e < firstCol; e++) {
      grid.appendChild(document.createElement("div")).className = "day-cell empty";
    }

    for (let d = 1; d <= totalDays; d++) {
      const cell = document.createElement("div");
      const currentCellDate = new Date(viewYear, viewMonth - 1, d);
      const compareToday = new Date(todayObj.getFullYear(), todayObj.getMonth(), todayObj.getDate());

      if (currentCellDate < compareToday) {
        cell.className = "day-cell past";
        cell.innerHTML = `<span class="day-num">${d}</span>`;
      } else {
        const key = `${viewYear}-${String(viewMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isBooked = bookedDates.has(key);
        cell.className = `day-cell ${isBooked ? 'booked' : 'open'}`;
        cell.innerHTML = `<span class="day-num">${d}</span><span class="status-dot"></span>`;
        cell.addEventListener("click", () => toggleDateStatus(key, isBooked));
      }
      grid.appendChild(cell);
    }
  }

  async function toggleDateStatus(key, isBooked) {
    loader.classList.remove("hidden");
    try {
      if (isBooked) {
        await deleteDoc(doc(db, "bookings", key));
      } else {
        await setDoc(doc(db, "bookings", key), { status: "booked", updatedAt: new Date().toISOString() });
      }
    } catch (e) { alert("Xəta: " + e.message); }
    finally { loader.classList.add("hidden"); }
  }

  document.getElementById("prev-btn").addEventListener("click", () => {
    viewMonth--; if (viewMonth < 1) { viewMonth = 12; viewYear--; } renderAdminCalendar();
  });
  document.getElementById("next-btn").addEventListener("click", () => {
    viewMonth++; if (viewMonth > 12) { viewMonth = 1; viewYear++; } renderAdminCalendar();
  });

  function startFirebaseListener() {
    unsubscribeSnapshot = onSnapshot(collection(db, "bookings"), (snap) => {
      bookedDates.clear();
      snap.forEach(doc => bookedDates.add(doc.id));
      renderAdminCalendar();
      loader.classList.add("hidden");
    }, () => loader.classList.add("hidden"));
  }
</script>
</body>
</html>
